version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "YourPassword123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourPassword123! -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: ./OrderService
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=OrderServiceDb;User Id=sa;Password=YourPassword123!;TrustServerCertificate=True
      - AzureServiceBus__ConnectionString=${SERVICE_BUS_CONNECTION_STRING}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=order-processing-system
      - Jwt__Audience=order-processing-clients
    depends_on:
      sqlserver:
        condition: service_healthy

  inventory-service:
    build:
      context: ./InventoryService
      dockerfile: Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=InventoryServiceDb;User Id=sa;Password=YourPassword123!;TrustServerCertificate=True
      - AzureServiceBus__ConnectionString=${SERVICE_BUS_CONNECTION_STRING}
    depends_on:
      sqlserver:
        condition: service_healthy

  notification-service:
    build:
      context: ./NotificationService
      dockerfile: Dockerfile
    ports:
      - "5003:8080"
    environment:
      - AzureServiceBus__ConnectionString=${SERVICE_BUS_CONNECTION_STRING}
      - Smtp__Host=${SMTP_HOST}
      - Smtp__Port=${SMTP_PORT}
      - Smtp__Username=${SMTP_USERNAME}
      - Smtp__Password=${SMTP_PASSWORD}
      - Smtp__FromEmail=${SMTP_FROM_EMAIL}
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqldata:
